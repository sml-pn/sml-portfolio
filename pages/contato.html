<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | SML Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-[#0a0f1e] text-white font-mono">
    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-2xl w-full bg-white/5 backdrop-blur-sm rounded-2xl p-8 border border-[#00ffff]/30">
            <h1 class="text-4xl font-bold text-center mb-8 bg-gradient-to-r from-[#00ffff] to-[#ff00ff] bg-clip-text text-transparent">📩 Contato</h1>
            <form id="form-contato" class="space-y-6">
                <input type="text" placeholder="Seu nome" class="w-full px-4 py-3 bg-white/10 rounded-lg border border-white/20 focus:outline-none focus:border-[#00ffff]">
                <input type="email" placeholder="Seu e-mail" class="w-full px-4 py-3 bg-white/10 rounded-lg border border-white/20 focus:outline-none focus:border-[#00ffff]">
                <textarea placeholder="Sua mensagem" rows="6" class="w-full px-4 py-3 bg-white/10 rounded-lg border border-white/20 focus:outline-none focus:border-[#00ffff]"></textarea>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-[#00ffff] to-[#ff00ff] rounded-lg font-bold hover:scale-105 transition">Enviar mensagem</button>
            </form>
            <div class="text-center mt-8">
                <a href="../index.html" class="text-[#00ffff] hover:underline">← Voltar ao início</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('form-contato')?.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('🚀 Mensagem enviada! Entrarei em contato em breve.');
            e.target.reset();
        });
    </script>
</body>
</html>
